<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather | Energy Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="project-page-body">
    <div id="project-header-root"></div>
    <main class="page page--project">
      <div id="project-sidebar-root"></div>
      <section class="card">
        <header class="card__header">
          <h1>Weather</h1>
        </header>
        <div class="layout">
          <div class="settings">
            <div class="field">
              <label>Weather Location</label>
              <p class="location" id="location-value">No location selected</p>
              <p class="location" id="utility-value">Utility: --</p>
              <div class="project-actions">
                <button class="btn btn--toggle" id="select-map">Select on Map</button>
              </div>
              <div class="provider-actions">
                <button class="btn btn--toggle" id="provider-open-meteo" type="button">Get Weather Data</button>
                <details class="other-sources" id="other-sources">
                  <summary class="other-sources__summary">Other data sources</summary>
                  <div class="other-sources__content">
                    <button class="btn btn--toggle" id="provider-nrel" type="button">2014 NREL Data</button>
                  </div>
                </details>
              </div>
              <div class="status status--loading weather-loading-status" id="loading-status" hidden>
                <span class="status__text" id="loading-text">Loading data for 2024…</span>
                <div class="loading-bars">
                  <div class="loading-bar loading-bar--step">
                    <span class="loading-bar__fill" id="loading-step-bar"></span>
                  </div>
                  <div class="loading-bar loading-bar--overall">
                    <span class="loading-bar__fill" id="loading-overall-bar"></span>
                  </div>
                </div>
              </div>
              <div class="status status--success" id="success-status" hidden>Data ready for 2024.</div>
              <div class="status status--error" id="error-status" hidden>Unable to load data.</div>
            </div>
          </div>
          <div class="map" id="map"></div>
        </div>
        <div class="toolbar">
          <div id="weather-control-strip-root"></div>
        </div>
        <section class="chart-panel">
          <header class="chart-panel__header">
            <div>
              <h2>Weather Profile</h2>
              <div id="weather-chart-legend-root"></div>
            </div>
            <p class="chart-panel__date" id="chart-date">February 9, 2024</p>
          </header>
          <div class="chart-display" id="chart-display" title="Solar/wind values for each time bucket.">
            <div class="chart-svg" id="weather-chart-root" aria-label="Weather chart"></div>
            <div class="chart-loading" id="settings-chart-loading" hidden>Loading...</div>
          </div>
          <div class="chart-axis chart-axis--below" id="chart-axis"></div>
          <details class="debug-panel" id="debug-panel">
            <summary>Data debug</summary>
            <pre id="debug-output">No debug data yet.</pre>
          </details>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/config.local.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/assets/js/core/charting.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/core/supabase-config.js"></script>
    <script src="/assets/js/core/supabase-client.js"></script>
    <script src="/assets/js/components/chart-ui.js"></script>
    <script src="/assets/js/components/time-series-chart.js"></script>
    <script src="/assets/js/components/project-shell.js"></script>
    <script>
      window.EnergyProjectShell?.mount({
        headerRootId: "project-header-root",
        sidebarRootId: "project-sidebar-root",
        header: {
          editor: {
            editorId: "project-name-editor",
            displayId: "header-project-name-display",
            editButtonId: "header-project-name-edit",
            inputId: "header-project-name",
            saveButtonId: "header-project-name-save",
            cancelButtonId: "header-project-name-cancel",
          },
          exitHref: "/",
        },
        sidebar: {
          ariaLabel: "Project navigation",
          items: [
            { key: "weather", label: "Weather", href: "/projects/weather.html", active: true },
            { key: "generation", label: "Generation", href: "/projects/generation.html", id: "header-assets-link" },
            { key: "load-builder", label: "Load Profiles", href: "/projects/load-builder.html", id: "header-load-builder-link" },
            { key: "storage", label: "Storage", href: "/projects/storage.html", id: "header-storage-link" },
            { key: "rates", label: "Rates", href: "/projects/rates-v4.html", id: "header-rates-link" },
          ],
        },
      });
    </script>
    <script src="/assets/js/core/shared-cache.js"></script>
    <script src="/assets/js/core/models.js"></script>
    <script src="/assets/js/core/data-utils.js"></script>
    <script src="/assets/js/features/weather-coverage-engine.js"></script>
    <script src="/assets/js/features/weather-sync-bus.js"></script>
    <script src="/assets/js/pages/weather.js"></script>
  </body>
</html>
