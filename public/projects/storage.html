<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storage</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="project-page-body">
    <div id="project-header-root"></div>
    <main class="page page--project assets-page">
      <div id="project-sidebar-root"></div>
      <section class="card assets-card">
        <section class="assets-summary">
          <div class="assets-inputs storage-inputs">
            <div class="assets-column">
              <div class="assets-column__header">
                <h3>Battery Assets</h3>
                <button class="btn btn--primary assets-add" id="add-storage" type="button">Add Storage</button>
              </div>
              <div class="assets-list" id="storage-assets"></div>
            </div>
          </div>
        </section>

        <div class="assets-divider"></div>

        <section class="assets-chart-section">
          <h3 class="assets-chart-title">State of charge</h3>
          <div class="assets-chart-header">
            <div class="assets-chart-controls">
              <div id="storage-control-strip-root"></div>
            </div>
            <div id="storage-chart-legend-root"></div>
          </div>
          <div class="assets-chart-frame" id="storage-chart-frame">
            <div
              id="storage-chart-root"
              class="generation-chart"
              aria-label="State of charge chart"
            ></div>
            <div class="chart-loading" id="storage-chart-loading" hidden>Loading...</div>
          </div>
          <div class="assets-chart-axis" id="storage-axis"></div>
          <details class="debug-panel assets-debug" id="storage-debug-panel">
            <summary>Storage debug</summary>
            <pre id="storage-debug-output">No storage debug data yet.</pre>
          </details>
        </section>
      </section>
    </main>

    <dialog class="delete-modal" id="delete-storage-modal">
      <form method="dialog" class="delete-modal__content">
        <h3>Delete storage asset?</h3>
        <p>This action cannot be undone.</p>
        <div class="delete-modal__actions">
          <button class="btn" value="cancel">Cancel</button>
          <button class="btn btn--danger" id="confirm-delete-storage" value="confirm">Delete</button>
        </div>
      </form>
    </dialog>

    <div id="storage-field-tooltip" class="asset-field-tooltip" hidden></div>

    <script src="/config.local.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/assets/js/core/charting.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/core/supabase-config.js"></script>
    <script src="/assets/js/core/supabase-client.js"></script>
    <script src="/assets/js/components/chart-ui.js"></script>
    <script src="/assets/js/components/time-series-chart.js"></script>
    <script src="/assets/js/components/project-shell.js"></script>
    <script>
      window.EnergyProjectShell?.mount({
        headerRootId: "project-header-root",
        sidebarRootId: "project-sidebar-root",
        header: {
          editor: {
            editorId: "storage-project-name-editor",
            displayId: "storage-header-project-name-display",
            editButtonId: "storage-header-project-name-edit",
            inputId: "storage-header-project-name",
            saveButtonId: "storage-header-project-name-save",
            cancelButtonId: "storage-header-project-name-cancel",
          },
          exitHref: "/",
        },
        sidebar: {
          ariaLabel: "Project navigation",
          items: [
            { key: "weather", label: "Weather", href: "/projects/weather.html", id: "storage-settings-link" },
            { key: "generation", label: "Generation", href: "/projects/generation.html", id: "storage-assets-link" },
            { key: "load-builder", label: "Load Profiles", href: "/projects/load-builder.html", id: "storage-load-builder-link" },
            { key: "storage", label: "Storage", href: "/projects/storage.html", active: true },
            { key: "rates", label: "Rates", href: "/projects/rates-v4.html", id: "storage-rates-link" },
          ],
        },
      });
    </script>
    <script src="/assets/js/core/shared-cache.js"></script>
    <script src="/assets/js/core/models.js"></script>
    <script src="/assets/js/features/generation.js"></script>
    <script src="/assets/js/pages/storage.js"></script>
  </body>
</html>
