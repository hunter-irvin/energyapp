<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generation | Energy Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="project-page-body">
    <div id="project-header-root"></div>
    <main class="page page--project assets-page">
      <div id="project-sidebar-root"></div>
      <section class="card assets-card">
        <header class="assets-header">
          <h1>Generation</h1>
        </header>
        <section class="assets-summary">
          <div class="assets-inputs">
            <div class="assets-column">
              <div class="assets-column__header">
                <h3>Solar Assets</h3>
                <button class="btn btn--primary assets-add" id="add-solar" type="button">Add Solar</button>
              </div>
              <div class="assets-list" id="solar-assets"></div>
            </div>
            <div class="assets-column">
              <div class="assets-column__header">
                <h3>Wind Assets</h3>
                <button class="btn btn--primary assets-add" id="add-wind" type="button">Add Wind</button>
              </div>
              <div class="assets-list" id="wind-assets"></div>
            </div>
          </div>
        </section>
        <div class="assets-divider"></div>
        <section class="assets-chart-section">
          <h3 class="assets-chart-title">Expected Generation</h3>
          <div class="assets-chart-header">
            <div class="assets-chart-controls">
              <div id="generation-control-strip-root"></div>
            </div>
            <div id="generation-chart-legend-root"></div>
          </div>
          <div class="assets-chart-layout">
            <div class="assets-timeseries-panel">
              <div class="assets-chart-frame" id="assets-chart-frame">
                <div id="generation-chart-root" class="generation-chart" aria-label="Typical generation chart"></div>
                <div class="chart-loading" id="assets-chart-loading" hidden>Loading...</div>
              </div>
              <div class="assets-chart-axis" id="generation-axis"></div>
            </div>
            <aside class="assets-donut-panel" aria-label="Total generation donut chart">
              <h4>Total Energy</h4>
              <svg id="generation-donut" class="generation-donut" viewBox="0 0 220 220" aria-label="Solar and wind energy mix"></svg>
              <p id="generation-total-energy" class="generation-total-energy">0.00 kWh</p>
            </aside>
          </div>
          <details class="debug-panel assets-debug" id="generation-debug-panel" hidden>
            <summary>Generation debug</summary>
            <pre id="generation-debug-output">No generation debug data yet.</pre>
          </details>
        </section>
      </section>
    </main>

    <dialog class="delete-modal" id="delete-asset-modal">
      <form method="dialog" class="delete-modal__content">
        <h3>Delete asset?</h3>
        <p>This action cannot be undone.</p>
        <div class="delete-modal__actions">
          <button class="btn" value="cancel">Cancel</button>
          <button class="btn btn--danger" id="confirm-delete-asset" value="confirm">Delete</button>
        </div>
      </form>
    </dialog>

    <div id="asset-field-tooltip" class="asset-field-tooltip" hidden></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/config.local.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/assets/js/core/charting.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/core/supabase-config.js"></script>
    <script src="/assets/js/core/supabase-client.js"></script>
    <script src="/assets/js/components/chart-ui.js"></script>
    <script src="/assets/js/components/time-series-chart.js"></script>
    <script src="/assets/js/components/project-shell.js"></script>
    <script>
      window.EnergyProjectShell?.mount({
        headerRootId: "project-header-root",
        sidebarRootId: "project-sidebar-root",
        header: {
          editor: {
            editorId: "project-name-editor",
            displayId: "header-project-name-display",
            editButtonId: "header-project-name-edit",
            inputId: "header-project-name",
            saveButtonId: "header-project-name-save",
            cancelButtonId: "header-project-name-cancel",
          },
          exitHref: "/",
        },
        sidebar: {
          ariaLabel: "Project navigation",
          items: [
            { key: "location", label: "Location", href: "/projects/location.html", id: "header-settings-link" },
            { key: "generation", label: "Generation", href: "/projects/generation.html", active: true },
            { key: "storage", label: "Storage", href: "/projects/storage.html", id: "sidebar-storage-link" },
            { key: "rates", label: "Rates", href: "/projects/rates.html", id: "sidebar-rates-link" },
          ],
        },
      });
    </script>
    <script src="/assets/js/core/shared-cache.js"></script>
    <script src="/assets/js/core/models.js"></script>
    <script src="/assets/js/features/generation.js"></script>
    <script src="/assets/js/pages/generation.js"></script>
  </body>
</html>
