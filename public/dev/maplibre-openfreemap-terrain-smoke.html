<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapLibre OpenFreeMap Terrain Smoke Test</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.css" />
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }

      .smoke-panel {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(31, 41, 55, 0.18);
        border-radius: 8px;
        color: #111827;
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        left: 12px;
        max-width: 360px;
        padding: 10px 12px;
        position: absolute;
        top: 12px;
        z-index: 2;
      }

      .smoke-panel strong {
        display: block;
        font-size: 14px;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="smoke-panel">
      <strong>MapLibre + OpenFreeMap + AWS Terrain</strong>
      Right-click drag to rotate, drag to pan, scroll to zoom. Terrain source:
      AWS Open Data Terrarium DEM.
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.js"></script>
    <script>
      const TERRAIN_SOURCE_ID = "terrain-dem";
      const map = new maplibregl.Map({
        container: "map",
        style: "https://tiles.openfreemap.org/styles/liberty",
        center: [-105.2705, 40.015],
        zoom: 13,
        pitch: 62,
        bearing: -28,
        maxPitch: 75,
        attributionControl: true,
      });

      map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

      map.on("style.load", () => {
        if (!map.getSource(TERRAIN_SOURCE_ID)) {
          map.addSource(TERRAIN_SOURCE_ID, {
            type: "raster-dem",
            tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
            tileSize: 256,
            encoding: "terrarium",
            maxzoom: 15,
            attribution:
              '<a href="https://registry.opendata.aws/terrain-tiles/" target="_blank" rel="noopener">AWS Open Data Terrain Tiles</a>',
          });
        }
        map.setTerrain({ source: TERRAIN_SOURCE_ID, exaggeration: 1.25 });
        map.setSky({
          "sky-color": "#dbeafe",
          "sky-horizon-blend": 0.25,
          "horizon-color": "#f8fafc",
          "horizon-fog-blend": 0.35,
        });
      });

      window.__terrainSmoke = {
        getState() {
          return {
            loaded: map.loaded(),
            style: map.getStyle().name || null,
            terrain: map.getTerrain(),
            center: map.getCenter().toArray(),
            zoom: map.getZoom(),
            pitch: map.getPitch(),
            bearing: map.getBearing(),
            sourceIds: Object.keys(map.getStyle().sources || {}),
            layerIds: (map.getStyle().layers || []).map((layer) => layer.id),
          };
        },
      };
    </script>
  </body>
</html>
