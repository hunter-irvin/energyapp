<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="project-page-body">
    <header class="project-header">
      <div class="project-header__left">
        <label class="project-header__label" for="header-project-name">Project Name</label>
        <input id="header-project-name" class="project-header__input" type="text" placeholder="Untitled Project" />
      </div>
      <a class="btn" href="projects.html">Exit</a>
    </header>
    <main class="page page--project">
      <aside class="project-sidebar" aria-label="Project navigation">
        <a class="project-nav-btn project-nav-btn--active" href="index.html">Settings</a>
        <a class="project-nav-btn" id="header-assets-link" href="assets.html">Assets</a>
      </aside>
      <section class="card">
        <header class="card__header">
          <h1>Facility Settings</h1>
        </header>
        <div class="layout">
          <div class="settings">
            <div class="field">
              <label>Location</label>
              <p class="location" id="location-value">No location selected</p>
              <div class="project-actions">
                <button class="btn btn--primary" id="select-map">Select on Map</button>
              </div>
              <div class="provider-actions">
                <button class="btn btn--toggle" id="provider-nrel" type="button">2014 NREL Data</button>
                <button class="btn btn--toggle" id="provider-open-meteo" type="button">Last Year + 7 Day Forecast</button>
              </div>
              <div class="status status--loading" id="loading-status" hidden>
                <span class="status__text" id="loading-text">Loading data for 2024…</span>
                <div class="loading-bars">
                  <div class="loading-bar loading-bar--step">
                    <span class="loading-bar__fill" id="loading-step-bar"></span>
                  </div>
                  <div class="loading-bar loading-bar--overall">
                    <span class="loading-bar__fill" id="loading-overall-bar"></span>
                  </div>
                </div>
              </div>
              <div class="status status--success" id="success-status" hidden>Data ready for 2024.</div>
              <div class="status status--error" id="error-status" hidden>Unable to load data.</div>
            </div>
          </div>
          <div class="map" id="map"></div>
        </div>
        <div class="toolbar">
          <div class="toggle-group">
            <button class="btn btn--toggle" data-period="day">Day</button>
            <button class="btn btn--toggle is-active" data-period="week">Week</button>
            <button class="btn btn--toggle" data-period="month">Month</button>
            <button class="btn btn--toggle" data-period="year">Year</button>
            <button class="btn btn--icon" id="date-picker-button" aria-label="Pick a date">
              📅
            </button>
            <input class="date-picker" id="date-picker" type="date" aria-label="Select date" />
          </div>
          <div class="toggle-group">
            <button class="btn btn--toggle is-active" data-view="chart">Chart</button>
            <button class="btn btn--toggle" data-view="table">Table</button>
          </div>
        </div>
        <section class="chart-panel">
          <header class="chart-panel__header">
            <div>
              <h2>Weather Profile</h2>
              <p class="chart-panel__legend">
                <button class="legend legend--solar is-active" data-series="solar" type="button">
                  Solar
                </button>
                <button class="legend legend--wind is-active" data-series="wind" type="button">
                  Wind
                </button>
              </p>
            </div>
            <p class="chart-panel__date" id="chart-date">February 9, 2024</p>
          </header>
          <div class="chart-display" id="chart-display" title="Solar/wind values for each time bucket.">
            <svg class="chart-svg" id="chart-svg" viewBox="0 0 600 220" preserveAspectRatio="none"></svg>
            <div class="chart-hover-line" id="chart-hover-line" hidden></div>
            <div class="chart-tooltip" id="chart-tooltip" hidden></div>
            <div class="chart-axis-title chart-axis-title--left">Wind (m/s)</div>
            <div class="chart-axis-title chart-axis-title--right">Solar (W/m²)</div>
          </div>
          <div class="chart-axis chart-axis--below" id="chart-axis"></div>
          <div class="table-panel" id="table-panel" hidden>
            <table class="data-table">
              <thead>
                <tr>
                  <th title="Local time bucket for this reading.">Timestamp</th>
                  <th title="Solar irradiance in watts per square meter.">Solar (GHI)</th>
                  <th title="Wind speed in meters per second.">Wind Speed</th>
                  <th title="Wind direction in degrees from north.">Direction</th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
            <div class="table-actions">
              <button class="btn btn--toggle" id="table-load-more" hidden>Load more</button>
            </div>
            <details class="debug-panel" id="debug-panel">
              <summary>Data debug</summary>
              <pre id="debug-output">No debug data yet.</pre>
            </details>
          </div>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.local.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="models.js"></script>
    <script src="data-utils.js"></script>
    <script src="app.js"></script>
  </body>
</html>
